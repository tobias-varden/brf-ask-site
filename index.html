<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zettel Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Zettel Search</h1>
    <p id="status">Loading model…</p>
    <form id="search-form">
      <input id="query" type="search" placeholder="Ask anything…" autocomplete="off">
      <button type="submit">Search</button>
    </form>
    <details id="settings">
      <summary>LLM Settings</summary>
      <div class="settings-body">
        <label>
          OpenAI-compatible endpoint
          <input id="llm-endpoint" type="url" placeholder="http://localhost:11434/v1" spellcheck="false">
        </label>
        <label>
          Model name
          <input id="llm-model" type="text" placeholder="llama3">
        </label>
        <p class="settings-hint">Leave endpoint blank to use Chrome AI only.</p>
      </div>
    </details>

    <section id="answer-section">
      <h2>Answer</h2>
      <div id="answer"></div>
    </section>
    <section id="results-section">
      <h2>Sources</h2>
      <div id="results"></div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
